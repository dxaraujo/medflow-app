services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    volumes:
      - medflow_mongo_data:/data/db
    ports:
      - "27017:27017"
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 5s
      timeout: 5s
      retries: 8
      start_period: 10s

  api:
    build:
      context: .
      dockerfile: docker/Dockerfile
      target: api
    restart: unless-stopped
    environment:
      MONGODB_URI: mongodb://mongo:27017/medflow
      MONGODB_DB_NAME: medflow
      PORT: "3000"
    depends_on:
      mongo:
        condition: service_healthy
    expose:
      - "3000"

  web:
    build:
      context: .
      dockerfile: docker/Dockerfile
      target: web
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      - api

volumes:
  medflow_mongo_data:
